name: "CodeQL Auto-Fix"

on:
  workflow_dispatch:
    inputs:
      alert_number:
        description: 'CodeQL alert number (leave empty for the latest open alert)'
        required: false
      model:
        description: 'Select Gemini model'
        required: true
        default: 'gemini-2.5-flash'
        type: choice
        options:
          - 'gemini-2.5-flash'
          - 'gemini-2.5-pro'
          - 'gemini-3.1-pro-preview'
          - 'gemini-3.1-flash-lite-preview'
          - 'gemma-4-26b-a4b-it'
          - 'gemma-4-31b-it'

jobs:
  fix-codeql-issue:
    runs-on: ubuntu-latest
    permissions:
      security-events: read
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Get CodeQL Alert Details
        id: codeql
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${{ github.event.inputs.alert_number }}" ]; then
            echo "Fetching latest open alert..."
            ALERT=$(gh api repos/${{ github.repository }}/code-scanning/alerts?state=open --jq '.[0]')
          else
            echo "Fetching alert number: ${{ github.event.inputs.alert_number }}..."
            ALERT=$(gh api repos/${{ github.repository }}/code-scanning/alerts/${{ github.event.inputs.alert_number }})
          fi
          
          if [ "$ALERT" == "null" ] || [ -z "$ALERT" ]; then
            echo "::error::No open CodeQL alerts found."
            exit 1
          fi

          # Extract data using quoted variable to handle JSON safely
          DESC=$(echo "$ALERT" | jq -r '.rule.description // .rule.id')
          RULE_ID=$(echo "$ALERT" | jq -r '.rule.id')
          MESSAGE=$(echo "$ALERT" | jq -r '.most_recent_instance.message.text')
          TOOL=$(echo "$ALERT" | jq -r '.tool.name')
          PATH_VAL=$(echo "$ALERT" | jq -r '.most_recent_instance.location.path')
          LINE_VAL=$(echo "$ALERT" | jq -r '.most_recent_instance.location.start_line')
          NUM=$(echo "$ALERT" | jq -r '.number')
          TAGS=$(echo "$ALERT" | jq -r '.rule.tags | join(", ")')
          CWE=$(echo "$ALERT" | jq -r '.rule.tags[] | select(startswith("external/cwe/"))' | sed 's/external\/cwe\///g' | tr '\n' ' ' | xargs || echo "N/A")
          SEVERITY=$(echo "$ALERT" | jq -r '.rule.security_severity_level // "unknown"')
          HELP_URL=$(echo "$ALERT" | jq -r '.rule.help_uri // ""')
          
          echo "description<<EOF" >> $GITHUB_OUTPUT
          echo "$DESC" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "rule_id<<EOF" >> $GITHUB_OUTPUT
          echo "$RULE_ID" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "tool<<EOF" >> $GITHUB_OUTPUT
          echo "$TOOL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "location<<EOF" >> $GITHUB_OUTPUT
          echo "${PATH_VAL}:${LINE_VAL}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "alert_number<<EOF" >> $GITHUB_OUTPUT
          echo "$NUM" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "cwe<<EOF" >> $GITHUB_OUTPUT
          echo "$CWE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "severity<<EOF" >> $GITHUB_OUTPUT
          echo "$SEVERITY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "help_url<<EOF" >> $GITHUB_OUTPUT
          echo "$HELP_URL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Clean JSON: keep only essential parts for the fix to save tokens
          CLEAN_JSON=$(echo "$ALERT" | jq -c '{
            rule: .rule,
            message: .most_recent_instance.message.text,
            location: .most_recent_instance.location,
            code_flows: .most_recent_instance.code_flows
          }')
          
          echo "full_json<<EOF" >> $GITHUB_OUTPUT
          echo "$CLEAN_JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gemini Security Fix
        id: fix_attempt
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: true
          VULN_TOOL: ${{ steps.codeql.outputs.tool }}
          VULN_DESC: ${{ steps.codeql.outputs.description }}
          VULN_LOC: ${{ steps.codeql.outputs.location }}
          VULN_JSON: ${{ steps.codeql.outputs.full_json }}
          SELECTED_MODEL: ${{ github.event.inputs.model }}
        run: |
          mkdir -p .gemini
          
          # Fetch model metadata to get inputTokenLimit
          MODEL_ID="$SELECTED_MODEL"
          [[ "$MODEL_ID" != models/* ]] && MODEL_ID="models/$MODEL_ID"
          
          echo "Fetching metadata for $MODEL_ID..."
          MODEL_INFO=$(curl -s "https://generativelanguage.googleapis.com/v1beta/$MODEL_ID?key=$GEMINI_API_KEY")
          
          # Extract inputTokenLimit or default to 1M
          MAX_TOKENS=$(echo "$MODEL_INFO" | jq -r '.inputTokenLimit // 1048576')
          
          # Determine maxAttempts based on model tier
          ATTEMPTS=10
          
          echo "Dynamic Configuration Applied:"
          echo "- Max Tokens: $MAX_TOKENS"
          echo "- Max Attempts: $ATTEMPTS"
          
          cat <<EOF > .gemini/settings.json
          {
            "general": {
              "maxAttempts": $ATTEMPTS,
              "retryFetchErrors": true
            },
            "contextManagement": {
              "historyWindow": {
                "maxTokens": $MAX_TOKENS
              }
            },
            "tools": {
              "truncateToolOutputThreshold": 10000
            },
            "agents": {
              "disableSubagents": true
            }
          }
          EOF
          
          # List skills to verify discovery
          echo "Discovered Skills:"
          gemini skills list
          
          gemini --model "$SELECTED_MODEL" --approval-mode=yolo "Use the 'security-fixer' skill to repair the security vulnerability: $VULN_DESC at $VULN_LOC. CONTEXT (JSON): $VULN_JSON"

      - name: Final Verification
        id: final_verify
        continue-on-error: true
        run: |
          echo "Lint check skipped for now..."
          echo "status=FIXED" >> $GITHUB_OUTPUT
          echo "label=automated-fix" >> $GITHUB_OUTPUT
          # if npm run lint:fix; then
          #   echo "status=VERIFIED" >> $GITHUB_OUTPUT
          #   echo "label=verified-fix" >> $GITHUB_OUTPUT
          # else
          #   echo "status=LINT FAILED" >> $GITHUB_OUTPUT
          #   echo "label=failed-lint" >> $GITHUB_OUTPUT
          # fi

      - name: Cleanup Temporary Files
        if: always()
        run: |
          rm -f .gemini/settings.json

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH_NAME="fix/codeql-alert-${{ steps.codeql.outputs.alert_number }}"
          git checkout -b $BRANCH_NAME
          
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit. Gemini might have failed to find a fix or the issue is already resolved."
            exit 0
          fi
          
          git commit -m "security: fix CodeQL alert ${{ steps.codeql.outputs.alert_number }} (${{ steps.codeql.outputs.rule_id }})"
          git push origin $BRANCH_NAME --force
          
          # Prepare PR Body
          PR_BODY=$(cat <<EOF
          ### 🛡️ Security Fix: ${{ steps.codeql.outputs.description }}
          
          This Pull Request was automatically generated by **Gemini CLI** using the **security-fixer** skill to resolve a CodeQL security alert.
          
          #### 📝 Problem Analysis
          The static analysis tool identified a potential vulnerability in the codebase:
          - **Rule ID:** \`${{ steps.codeql.outputs.rule_id }}\`
          - **Severity:** \`${{ steps.codeql.outputs.severity }}\`
          - **Issue:** ${{ steps.codeql.outputs.message }}
          - **Location:** \`${{ steps.codeql.outputs.location }}\`
          
          #### 🔗 References & Context
          - **CWEs:** ${{ steps.codeql.outputs.cwe }}
          - **Tags:** ${{ steps.codeql.outputs.tags }}
          - **Full Alert Details:** [View in GitHub Security Tab](https://github.com/${{ github.repository }}/security/code-scanning/${{ steps.codeql.outputs.alert_number }})
          $(if [ -n "${{ steps.codeql.outputs.help_url }}" ]; then echo "- **Rule Documentation:** [GitHub Security Docs](${{ steps.codeql.outputs.help_url }})"; fi)
          
          #### 🛠️ Automated Solution
          The fix was generated using the **${{ github.event.inputs.model }}** model. It focuses on mitigating the risk while maintaining the original functionality and adhering to security best practices.
          
          > [!IMPORTANT]  
          > Please review this automated fix carefully to ensure it meets the project's requirements and doesn't introduce side effects.
          EOF
          )
          
          gh pr create \
            --repo ${{ github.repository }} \
            --title "[${{ steps.final_verify.outputs.status }}] Security Fix: ${{ steps.codeql.outputs.description }}" \
            --body "$PR_BODY" \
            --base ${{ github.event.repository.default_branch }} \
            --head $BRANCH_NAME \
            --label "security" \
            --label "automated-fix" \
            --label "${{ steps.final_verify.outputs.label }}" || echo "Pull Request already exists or failed to create."
name: "CodeQL Auto-Fix"

on:
  workflow_dispatch:
    inputs:
      alert_number:
        description: 'CodeQL alert number (leave empty for the latest open alert)'
        required: false
      model:
        description: 'Select Gemini model'
        required: true
        default: 'gemini-2.5-flash'
        type: choice
        options:
          - 'gemini-2.5-flash'
          - 'gemini-2.5-pro'
          - 'gemini-3.1-pro-preview'
          - 'gemini-3.1-flash-lite-preview'
          - 'gemma-4-26b-a4b-it'
          - 'gemma-4-31b-it'

jobs:
  fix-codeql-issue:
    runs-on: ubuntu-latest
    permissions:
      security-events: read
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Get CodeQL Alert Details
        id: codeql
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${{ github.event.inputs.alert_number }}" ]; then
            ALERT=$(gh api repos/${{ github.repository }}/code-scanning/alerts?state=open --jq '.[0]')
          else
            ALERT=$(gh api repos/${{ github.repository }}/code-scanning/alerts/${{ github.event.inputs.alert_number }})
          fi
          
          if [ "$ALERT" == "null" ] || [ -z "$ALERT" ]; then
            echo "No open CodeQL alerts found."
            exit 1
          fi

          # Extract data separately to avoid jq formatting issues
          DESC=$(echo $ALERT | jq -r '.rule.description')
          TOOL=$(echo $ALERT | jq -r '.tool.name')
          PATH_VAL=$(echo $ALERT | jq -r '.most_recent_instance.location.path')
          LINE_VAL=$(echo $ALERT | jq -r '.most_recent_instance.location.start_line')
          NUM=$(echo $ALERT | jq -r '.number')
          
          echo "description=$DESC" >> $GITHUB_OUTPUT
          echo "tool=$TOOL" >> $GITHUB_OUTPUT
          echo "location=${PATH_VAL}:${LINE_VAL}" >> $GITHUB_OUTPUT
          echo "alert_number=$NUM" >> $GITHUB_OUTPUT
          
          # Clean JSON: keep only essential parts for the fix to save tokens
          CLEAN_JSON=$(echo "$ALERT" | jq -c '{
            rule: .rule,
            message: .most_recent_instance.message.text,
            location: .most_recent_instance.location,
            code_flows: .most_recent_instance.code_flows
          }')
          
          echo "full_json<<EOF" >> $GITHUB_OUTPUT
          echo "$CLEAN_JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gemini Security Fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VULN_TOOL: ${{ steps.codeql.outputs.tool }}
          VULN_DESC: ${{ steps.codeql.outputs.description }}
          VULN_LOC: ${{ steps.codeql.outputs.location }}
          VULN_JSON: ${{ steps.codeql.outputs.full_json }}
          SELECTED_MODEL: ${{ github.event.inputs.model }}
        run: |
          mkdir -p .gemini
          
          # Fetch model metadata to get inputTokenLimit
          MODEL_ID="$SELECTED_MODEL"
          [[ "$MODEL_ID" != models/* ]] && MODEL_ID="models/$MODEL_ID"
          
          echo "Fetching metadata for $MODEL_ID..."
          MODEL_INFO=$(curl -s "https://generativelanguage.googleapis.com/v1beta/$MODEL_ID?key=$GEMINI_API_KEY")
          
          # Extract inputTokenLimit or default to 1M
          MAX_TOKENS=$(echo "$MODEL_INFO" | jq -r '.inputTokenLimit // 1048576')
          
          # Determine maxAttempts based on model tier
          ATTEMPTS=10
          
          echo "Dynamic Configuration Applied:"
          echo "- Max Tokens: $MAX_TOKENS"
          echo "- Max Attempts: $ATTEMPTS"
          
          cat <<EOF > .gemini/settings.json
          {
            "general": {
              "maxAttempts": $ATTEMPTS,
              "retryFetchErrors": true
            },
            "contextManagement": {
              "historyWindow": {
                "maxTokens": $MAX_TOKENS
              }
            },
            "tools": {
              "truncateToolOutputThreshold": 10000
            },
            "agents": {
              "disableSubagents": true
            }
          }
          EOF
          
          # List skills to verify discovery
          echo "Discovered Skills:"
          gemini skills list
          
          gemini --model "$SELECTED_MODEL" --approval-mode=yolo "Use the 'security-fixer' skill to repair the security vulnerability: $VULN_DESC at $VULN_LOC.
          
          CONTEXT (JSON): $VULN_JSON"

      - name: Cleanup Temporary Files
        if: always()
        run: |

      - name: Run Linting
        run: npm run lint:fix || echo "Linting found issues that couldn't be auto-fixed, but continuing to PR creation."

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH_NAME="fix/codeql-alert-${{ steps.codeql.outputs.alert_number }}"
          git checkout -b $BRANCH_NAME
          
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit. Gemini might have failed to find a fix or the issue is already resolved."
            exit 0
          fi
          
          git commit -m "security: fix CodeQL alert ${{ steps.codeql.outputs.alert_number }} (${{ steps.codeql.outputs.tool }})"
          git push origin $BRANCH_NAME --force
          
          gh pr create \
            --repo ${{ github.repository }} \
            --title "Security Fix: ${{ steps.codeql.outputs.description }}" \
            --body "This PR was automatically generated by Gemini CLI to fix a CodeQL vulnerability.
            
            **Vulnerability Details:**
            - **Tool:** ${{ steps.codeql.outputs.tool }}
            - **Description:** ${{ steps.codeql.outputs.description }}
            - **Location:** ${{ steps.codeql.outputs.location }}
            - **Alert:** [Link to Alert](https://github.com/${{ github.repository }}/security/code-scanning/${{ steps.codeql.outputs.alert_number }})" \
            --base ${{ github.event.repository.default_branch }} \
            --head $BRANCH_NAME \
            --label "security" \
            --label "automated-fix" || echo "Pull Request already exists or failed to create."